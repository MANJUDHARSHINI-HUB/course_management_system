<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — EduCore</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="admin-shell">
  <div class="admin-topbar">
    <a href="index.html" class="brand"><span class="brand-mark">EC</span>EduCore</a>
    <a href="index.html">← Back to Home</a>
  </div>

  <div class="admin-card">
    <span class="admin-badge"><span class="dot"></span>Administrator Access</span>
    <h1>Admin Sign In</h1>
    <p>This portal is restricted to authorized university staff.</p>

    <form data-demo-form>
      <div class="field with-icon">
        <label for="a-email">Email Address</label>
        <div class="input-wrap">
          <span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 6h16v12H4V6z" stroke="currentColor" stroke-width="1.6"/><path d="M4 7l8 6 8-6" stroke="currentColor" stroke-width="1.6"/></svg></span>
          <input id="a-email" type="email" placeholder="admin@university.edu" required>
        </div>
      </div>

      <div class="field with-icon">
        <label for="a-pass">Password</label>
        <div class="input-wrap">
          <span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="4" y="10" width="16" height="10" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M8 10V7a4 4 0 018 0v3" stroke="currentColor" stroke-width="1.6"/></svg></span>
          <input id="a-pass" type="password" placeholder="Enter your password" required>
          <button type="button" class="toggle-visibility" aria-label="Show password"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z" stroke="currentColor" stroke-width="1.6"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.6"/></svg></button>
        </div>
      </div>

      <div class="form-links">
        <label style="display:flex; align-items:center; gap:8px; font-size:13.5px; color:var(--sky-100); opacity:0.75;">
          <input type="checkbox" style="accent-color:var(--royal);"> Keep me signed in
        </label>
        <a href="#">Forgot Password?</a>
      </div>

      <button type="submit" class="btn btn-primary btn-block">Log In to Admin Panel</button>
    </form>

    <p class="admin-foot">Need administrator access? Contact the Registrar's Office.</p>

    <div class="admin-security-note">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" style="flex-shrink:0; margin-top:1px;"><rect x="4" y="10" width="16" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M8 10V7a4 4 0 018 0v3" stroke="currentColor" stroke-width="1.5"/></svg>
      <span>Sessions are monitored for security. Unauthorized access attempts are logged.</span>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
